<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&family=Playfair+Display:wght@400;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 2064px;
    height: 1080px;
    overflow: hidden;
    font-family: 'Montserrat', sans-serif;
  }
  .ad-container {
    position: relative;
    width: 2064px;
    height: 1080px;
    overflow: hidden;
    display: flex;
  }
  .bg-image {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: 30% center;
  }
  .overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(
      to right,
      rgba(15, 25, 50, 0.15) 0%,
      rgba(15, 25, 50, 0.3) 35%,
      rgba(15, 25, 50, 0.8) 55%,
      rgba(15, 25, 50, 0.95) 70%,
      rgba(15, 25, 50, 0.97) 100%
    );
  }
  .content {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: flex-end;
    padding: 110px 140px 110px 0;
  }
  .right-panel {
    display: flex;
    flex-direction: column;
    gap: 24px;
    max-width: 900px;
  }
  .logo {
    height: 50px;
    width: auto;
    align-self: flex-start;
    margin-bottom: 8px;
  }
  .headline {
    font-family: 'Playfair Display', serif;
    font-weight: 700;
    font-size: 52px;
    line-height: 1.15;
    color: #ffffff;
    letter-spacing: -0.3px;
  }
  .subheadline {
    font-family: 'Montserrat', sans-serif;
    font-weight: 400;
    font-size: 24px;
    line-height: 1.45;
    color: rgba(255, 255, 255, 0.78);
    max-width: 780px;
  }
  .cta-row {
    display: flex;
    align-items: center;
    margin-top: 12px;
  }
  .cta-button {
    display: inline-flex;
    align-items: center;
    gap: 14px;
    padding: 18px 36px;
    background: linear-gradient(135deg, #a8d7fc 0%, #ffffff 100%);
    border: 1.5px solid #1f3662;
    border-radius: 20px;
    font-family: 'Montserrat', sans-serif;
    font-weight: 700;
    font-size: 26px;
    color: #1f3662;
    text-decoration: none;
    letter-spacing: 0.2px;
  }
  .cta-icon {
    width: 42px;
    height: 42px;
  }
</style>
<script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
</head>
<body>
  <div class="ad-container">
    <img class="bg-image" src="https://www.figma.com/api/mcp/asset/af4b9cb3-55f7-4b87-b369-569941621700" alt="">
    <div class="overlay"></div>
    <div class="content">
      <div class="right-panel">
        <img class="logo" src="https://www.figma.com/api/mcp/asset/db8ffcdf-aa3a-4883-a3f9-bd35bc192079" alt="Marquis Who's Who">
        <h1 class="headline">In competitive environments, how your career is documented matters</h1>
        <p class="subheadline">The way your achievements are recognized can influence what comes next</p>
        <div class="cta-row">
          <a class="cta-button" href="#">
            See if you qualify
            <img class="cta-icon" src="https://www.figma.com/api/mcp/asset/a7759450-9298-4acc-9068-fcbace92d8fe" alt="">
          </a>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
